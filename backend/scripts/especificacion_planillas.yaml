# =============================================================
# FLUJO DE VALIDACIÓN Y APROBACIÓN
# =============================================================
#
# TRIGGER: El ATL marca el check "Completa" en una hoja de la planilla
#
# PASO 1 — El sistema detecta el check y corre las validaciones de esa hoja
#
# PASO 2A — Si hay errores (severity=error):
#   - Se resetea el check a "Pendiente" en esa hoja via Sheets API
#   - Se guarda el reporte de validaciones fallidas en TiDB
#   - El responsable ve en el módulo de control que esa hoja tiene errores
#   - El responsable revisa el reporte con el ATL para corregir
#   - El ATL corrige y vuelve a marcar "Completa" → vuelve al PASO 1
#
# PASO 2B — Si solo hay warnings (severity=warning):
#   - El check queda en "Completa" (no se resetea)
#   - Los warnings se guardan en el reporte pero no bloquean
#
# PASO 2C — Si no hay errores ni warnings:
#   - El check queda en "Completa"
#
# CRITERIO DE APROBACIÓN DEL EMAÚS:
#   1. Todas las hojas EE tienen check = Completa
#   2. La hoja PI tiene check = Completa (si el Emaús tiene PI activa)
#   3. La hoja Talleres tiene check = Completa
#   4. La hoja Establecimientos tiene check = Completa
#   5. Ninguna hoja tiene errores pendientes
#   → El Emaús queda disponible para que el Responsable o Admin lo apruebe
#
# NOTA: Los warnings se registran pero no bloquean la aprobación.
#       Si en producción se decide que deben bloquear, cambiar severity a error.
# =============================================================


