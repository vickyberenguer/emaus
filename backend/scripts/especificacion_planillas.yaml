# =============================================================
# VALIDACIONES - Hoja EE
# =============================================================
# severity: error = bloquea aprobación | warning = aviso
# Todas las celdas referencian el layout ACTUAL (post row-deletion)
# =============================================================

validations:

  # --- Campos básicos obligatorios ---
  - id: ee_basico_diocesis
    sheet: ee
    description: "Diócesis debe estar completa"
    severity: error
    when:
      field: Diocesis
      is_empty: true
    message: "Falta completar: Diócesis (C3)"

  - id: ee_basico_nombre
    sheet: ee
    description: "Nombre del EE debe estar completo"
    severity: error
    when:
      field: NombreEE
      is_empty: true
    message: "Falta completar: Nombre del Espacio Educativo (C4)"

  # --- Alfabetización Inicial (D26) ---
  - id: alfabinicial_si_requiere_datos
    sheet: ee
    description: "Si se realiza Alfabetización Inicial, el cuadro debe estar completo"
    severity: error
    when:
      field: Accion_ATE_AlfabInicial
      equals: "Sí"
    require_all:
      - field: Alfabetizacion_Nro
        not_empty: true
      - any_of:
          - field: Alfabetizacion_6_9
            not_empty: true
          - field: Alfabetizacion_10_14
            not_empty: true
          - field: Alfabetizacion_15_24
            not_empty: true
          - field: Alfabetizacion_25mas
            not_empty: true
      - field: Alfabetizacion_CantAlfabetizadores
        not_empty: true
      - field: Alfabetizacion_Freq
        not_empty: true
    message: "Se respondió que se realiza Alfabetización Inicial pero no se completó el cuadro de \"Propuestas de alfabetización\""

  - id: alfabinicial_no_pero_datos_presentes
    sheet: ee
    description: "Si NO se realiza Alfabetización Inicial, el cuadro debe estar vacío"
    severity: warning
    when:
      field: Accion_ATE_AlfabInicial
      equals: "No"
    require_all:
      - field: Alfabetizacion_Nro
        is_empty: true
      - field: Alfabetizacion_6_9
        is_empty: true
      - field: Alfabetizacion_10_14
        is_empty: true
      - field: Alfabetizacion_15_24
        is_empty: true
      - field: Alfabetizacion_25mas
        is_empty: true
      - field: Alfabetizacion_CantAlfabetizadores
        is_empty: true
      - field: Alfabetizacion_Freq
        is_empty: true
    message: "Se completó el cuadro de \"Propuestas de alfabetización\" pero se respondió que NO se realiza Alfabetización Inicial"

  # --- Propuesta DALE (D27) ---
  - id: dale_si_requiere_datos
    sheet: ee
    description: "Si se realiza Propuesta DALE, el cuadro debe estar completo"
    severity: error
    when:
      field: Accion_ATE_DALE
      equals: "Sí"
    require_all:
      - field: DALE_Nro
        not_empty: true
      - any_of:
          - field: DALE_6_9
            not_empty: true
          - field: DALE_10_14
            not_empty: true
          - field: DALE_15_24
            not_empty: true
          - field: DALE_25mas
            not_empty: true
      - field: DALE_EducadoresDale
        not_empty: true
      - field: DALE_Freq
        not_empty: true
    message: "Se respondió que se realiza Propuesta DALE pero no se completó el cuadro de \"Propuesta DALE\""

  - id: dale_no_pero_datos_presentes
    sheet: ee
    description: "Si NO se realiza DALE, el cuadro debe estar vacío"
    severity: warning
    when:
      field: Accion_ATE_DALE
      equals: "No"
    require_all:
      - field: DALE_Nro
        is_empty: true
      - field: DALE_EducadoresDale
        is_empty: true
      - field: DALE_Freq
        is_empty: true
    message: "Se completó el cuadro de \"Propuesta DALE\" pero se respondió que NO se realiza la acción"

  # --- Itinerancia (D32) ---
  - id: itinerancia_si_requiere_activ
    sheet: ee
    description: "Si se realiza Itinerancia, Itinerancia_Activ debe ser Sí"
    severity: error
    when:
      field: Accion_IC_Itinerancia
      equals: "Sí"
    require_all:
      - field: Itinerancia_Activ
        equals: "Sí"
    message: "Se respondió que se realiza Itinerancia pero no se completó el cuadro de \"Itinerancia\""

  - id: itinerancia_no_pero_activ_presente
    sheet: ee
    description: "Si NO se realiza Itinerancia, Itinerancia_Activ debe ser No"
    severity: warning
    when:
      field: Accion_IC_Itinerancia
      equals: "No"
    require_all:
      - field: Itinerancia_Activ
        not_equals: "Sí"
    message: "Se completó el cuadro de \"Itinerancia\" pero se respondió que NO se realiza la acción"

  # --- Equipamiento Informático e Internet (D42) ---
  - id: equipinf_si_requiere_datos
    sheet: ee
    description: "Si cuenta con equipamiento/internet, debe completar sección AlfabDig/Equipamiento"
    severity: error
    when:
      field: Accion_NT_EquiInfInt
      equals: "Sí"
    require_any_of:
      - field: AlfabDig_NT_AccesoInternet
        equals: "Sí"
      - any_of:
          - field: EquipInformatico_MonitorTubo
            greater_than: 0
          - field: EquipInformatico_MonitorPlano
            greater_than: 0
          - field: EquipInformatico_PCAllinOne
            greater_than: 0
          - field: EquipInformatico_PCEscritorio
            greater_than: 0
          - field: EquipInformatico_Notebook
            greater_than: 0
          - field: EquipInformatico_Tablet
            greater_than: 0
          - field: EquipInformatico_Impresora
            greater_than: 0
          - field: EquipInformatico_Multifuncion
            greater_than: 0
    message: "Se respondió que cuenta con Equipamiento informático e internet pero no se completó el cuadro de \"Alfabetización Digital y NT\" / \"Equipamiento informático\""

  - id: equipinf_no_pero_datos_presentes
    sheet: ee
    description: "Si NO cuenta con equipamiento, las secciones AlfabDig/Equipamiento deben estar vacías"
    severity: warning
    when:
      field: Accion_NT_EquiInfInt
      equals: "No"
    message: "Se respondió que NO cuenta con Equipamiento informático e internet pero se completaron datos en esas secciones"

  # --- AlfabDig: sub-validaciones (cuando D42=Sí) ---
  - id: alfabdig_sin_internet_requiere_motivo
    sheet: ee
    description: "Si no hay acceso a internet, debe indicarse el motivo"
    severity: error
    when:
      field: AlfabDig_NT_AccesoInternet
      equals: "No"
    require_all:
      - field: AlfabDig_NT_AccesoInternet_Falta
        not_empty: true
    message: "Alfabetización Digital: si no tiene acceso a internet, indicar causa (C155)"

  - id: alfabdig_formacion_requiere_talleres
    sheet: ee
    description: "Si se desarrollaron jornadas de formación digital, deben completarse los tipos de taller"
    severity: error
    when:
      field: AlfabDig_NT_Formacion
      equals: "Sí"
    require_all:
      - field: AlfabDig_NT_Digitales
        not_empty: true
      - field: AlfabDig_NT_Tall_Trabajo
        not_empty: true
      - field: AlfabDig_NT_Tall_Redes
        not_empty: true
      - field: AlfabDig_NT_Tall_Seguridad
        not_empty: true
    message: "Formación digital: si se realizaron jornadas, completar los tipos de taller (C157-C160)"

  - id: alfabdig_con_internet_requiere_uso
    sheet: ee
    description: "Si tiene acceso a internet, indicar si lo usan para trámites/sociales y estudio"
    severity: error
    when:
      field: AlfabDig_NT_AccesoInternet
      equals: "Sí"
    require_all:
      - field: AlfabDig_NT_Internet_Uso
        not_empty: true
      - field: AlfabDig_NT_Internet_Estudio
        not_empty: true
    message: "Alfabetización Digital: con acceso a internet, completar el uso (C161, C162)"

  # --- Apoyo Escolar Primario ---
  - id: apescolar_primaria_con_alumnos_requiere_freq
    sheet: ee
    description: "Si hay alumnos de primaria en apoyo escolar, debe completarse el cuadro de nivel primario"
    severity: error
    when:
      field: ApEscolar_Nro_Primaria
      greater_than: 0
    require_all:
      - field: ApEscolar_Freq_Primaria
        not_empty: true
    message: "Si hay niños de nivel primario en apoyo escolar, debe completarse el cuadro \"Apoyo escolar Nivel Primario\""

  - id: apescolar_primaria_sin_alumnos_sin_datos
    sheet: ee
    description: "Si no hay alumnos de primaria, el cuadro de nivel primario debe estar vacío"
    severity: warning
    when:
      field: ApEscolar_Nro_Primaria
      equals: 0
    require_all:
      - field: ApEscolar_Freq_Primaria
        is_empty: true
    message: "No hay alumnos de nivel primario pero está completado el cuadro \"Apoyo escolar Nivel Primario\""

  # --- Apoyo Escolar Secundario ---
  - id: apescolar_secundaria_con_alumnos_requiere_freq
    sheet: ee
    description: "Si hay alumnos de secundaria en apoyo escolar, debe completarse el cuadro de nivel secundario"
    severity: error
    when:
      field: ApEscolar_Nro_Secundaria
      greater_than: 0
    require_all:
      - field: ApEscolar_Freq_Secundaria
        not_empty: true
    message: "Si hay adolescentes de nivel secundario en apoyo escolar, debe completarse el cuadro \"Apoyo escolar Nivel Secundario\""

  - id: apescolar_secundaria_sin_alumnos_sin_datos
    sheet: ee
    description: "Si no hay alumnos de secundaria, el cuadro de nivel secundario debe estar vacío"
    severity: warning
    when:
      field: ApEscolar_Nro_Secundaria
      equals: 0
    require_all:
      - field: ApEscolar_Freq_Secundaria
        is_empty: true
    message: "No hay alumnos de nivel secundario pero está completado el cuadro \"Apoyo escolar Nivel Secundario\""


  # --- Becas Familiares: coherencia suma ---
  - id: bf_apoyo_escolar_suma_niveles
    sheet: ee
    description: "La cantidad de BF en apoyo escolar debe coincidir con la suma de niveles inicial, primario y secundario"
    severity: warning
    when:
      field: BF_Nro_ApEscolar
      greater_than: 0
    require_all:
      - sum_of: [BF_Nro_Inicial, BF_Nro_Primaria, BF_Nro_Secundaria]
        equals_field: BF_Nro_ApEscolar
    message: "La cantidad de BF en apoyo escolar debe coincidir con la suma de BF que asisten a nivel inicial, nivel primario y nivel secundario (suma de filas 58 a 60 debe coincidir con fila 57)"

  # --- Apoyo Escolar: coherencia acción vs datos ---
  - id: apescolar_accion_si_requiere_alumnos
    sheet: ee
    description: "Si se realiza Apoyo Escolar, debe haber al menos alumnos de primaria o secundaria"
    severity: error
    when:
      field: Accion_ATE_ApoyoEscolar
      equals: "Sí"
    require_any_of:
      - field: ApEscolar_Nro_Primaria
        greater_than: 0
      - field: ApEscolar_Nro_Secundaria
        greater_than: 0
    message: "Se respondió que se realiza Apoyo Escolar pero no hay alumnos de nivel primario ni secundario registrados"

  # --- BTU: coherencia abandono vs motivos ---
  - id: btu_abandono_requiere_motivo
    sheet: ee
    description: "Si hay abandonos de BTU, debe indicarse al menos un motivo"
    severity: error
    when:
      field: BTU_abandono
      greater_than: 0
    require_any_of:
      - field: BTU_abandono_horarios
        equals: "Sí"
      - field: BTU_abandono_costotransporte
        equals: "Sí"
      - field: BTU_abandono_cambiodomic
        equals: "Sí"
      - field: BTU_abandono_faltatiempo
        equals: "Sí"
      - field: BTU_abandono_accesotranspor
        equals: "Sí"
      - field: BTU_abandono_accesoboletoestudiantil
        equals: "Sí"
      - field: BTU_abandono_otro
        not_empty: true
    message: "Hay abandonos de BTU registrados pero no se indicó ningún motivo"

  # --- Itinerancia: coherencia espacios y actividades ---
  - id: itinerancia_activ_requiere_espacio
    sheet: ee
    description: "Si se realiza Itinerancia, debe indicarse al menos un espacio donde se desarrolla"
    severity: error
    when:
      field: Itinerancia_Activ
      equals: "Sí"
    require_any_of:
      - field: Itinerancia_Club
        equals: "Sí"
      - field: Itinerancia_Plaza
        equals: "Sí"
      - field: Itinerancia_Terreno
        equals: "Sí"
      - field: Itinerancia_Paraje
        equals: "Sí"
      - field: Itinerancia_Otro
        not_empty: true
    message: "Itinerancia activa pero no se indicó en qué espacio se desarrolla (club, plaza, terreno, paraje u otro)"

  - id: itinerancia_activ_requiere_actividad
    sheet: ee
    description: "Si se realiza Itinerancia, debe indicarse al menos una actividad"
    severity: error
    when:
      field: Itinerancia_Activ
      equals: "Sí"
    require_any_of:
      - field: Itinerancia_Act_Estim
        equals: "Sí"
      - field: Itinerancia_Act_PI
        equals: "Sí"
      - field: Itinerancia_Act_Alfabetizacion
        equals: "Sí"
      - field: Itinerancia_Act_Merienda
        equals: "Sí"
      - field: Itinerancia_Act_Recreacion
        equals: "Sí"
      - field: Itinerancia_Act_Talleres
        equals: "Sí"
      - field: Itinerancia_Act_Charlas
        equals: "Sí"
      - field: Itinerancia_Act_Festividades
        equals: "Sí"
      - field: Itinerancia_Act_Reuniones
        equals: "Sí"
    message: "Itinerancia activa pero no se indicó ninguna actividad que se desarrolla"

  - id: itinerancia_activ_requiere_freq
    sheet: ee
    description: "Si se realiza Itinerancia, debe indicarse la frecuencia"
    severity: error
    when:
      field: Itinerancia_Activ
      equals: "Sí"
    require_all:
      - field: Itinerancia_Freq
        not_empty: true
    message: "Itinerancia activa pero falta la frecuencia (C130)"

  # --- Adolescentes y Jóvenes ---
  - id: ayj_accion_si_requiere_nro
    sheet: ee
    description: "Si se realizan actividades de AyJ, debe haber número de participantes"
    severity: error
    when:
      field: Accion_IC_Adolescentes
      equals: "Sí"
    require_all:
      - field: AyJ_Nro
        greater_than: 0
    message: "Se respondió que se realizan actividades con Adolescentes y Jóvenes pero falta la cantidad (C125)"

  - id: ayj_ranking_sin_repetidos
    sheet: ee
    description: "Los valores del ranking de situaciones de AyJ deben ser todos diferentes (sin repetidos)"
    severity: warning
    require_all:
      - all_unique:
          - AyJ_rank_suicidio
          - AyJ_rank_faltaproyecto
          - AyJ_rank_consumo
          - AyJ_rank_apuestas
          - AyJ_rank_saludmental
          - AyJ_rank_violencia
          - AyJ_rank_violenciadigital
          - AyJ_rank_desvinculacion
    message: "El ranking de situaciones preocupantes (C254 a C261) tiene números repetidos. Cada situación debe tener un número diferente del 1 al 8"

  - id: ayj_con_participantes_requiere_freq
    sheet: ee
    description: "Si hay participantes de AyJ, debe indicarse la frecuencia"
    severity: error
    when:
      field: AyJ_Nro
      greater_than: 0
    require_all:
      - field: AyJ_Freq
        not_empty: true
    message: "Hay participantes de AyJ registrados pero falta la frecuencia (C126)"

  # --- Grupo de Mujeres ---
  - id: gm_con_participantes_requiere_freq
    sheet: ee
    description: "Si hay participantes en Grupo de Mujeres, debe indicarse la frecuencia"
    severity: error
    when:
      field: GM_RC_Nro
      greater_than: 0
    require_all:
      - field: GM_RC_Freq
        not_empty: true
    message: "Hay participantes en Grupo de Mujeres registrados pero falta la frecuencia (C176)"

  # --- Edilicio: coherencia baño ---
  - id: banio_si_requiere_nro
    sheet: ee
    description: "Si tiene baño, debe indicarse la cantidad"
    severity: error
    when:
      field: EE_Banio
      equals: "Sí"
    require_all:
      - field: EE_Banio_Nro
        greater_than: 0
    message: "El EE tiene baño pero no se indicó la cantidad (C202)"

  # --- Edilicio: zona ---
  - id: zona_al_menos_una
    sheet: ee
    description: "Debe indicarse al menos un tipo de zona"
    severity: error
    require_any_of:
      - field: EE_Zona_Urbana
        equals: "Sí"
      - field: EE_Zona_Periferica
        equals: "Sí"
      - field: EE_Zona_Rural
        equals: "Sí"
    message: "No se indicó el tipo de zona del EE (urbana, periférica o rural) — C191/C192/C193"

  # --- Articulación Nivel Superior ---
  - id: articula_ns_si_requiere_cuantas_e_institucion
    sheet: ee
    description: "Si articula con instituciones de nivel superior, indicar cuántas y al menos una institución"
    severity: error
    when:
      field: Articula_InstNivelSuperior
      equals: "Sí"
    require_all:
      - field: Articula_InstNivelSuperior_Cuantas
        greater_than: 0
      - field: Articula_Institucion1
        not_empty: true
    message: "Se respondió que articula con instituciones de nivel superior pero falta la cantidad o el nombre de la primera institución"

  # --- Asistentes ---
  - id: asistentes_al_menos_uno
    sheet: ee
    description: "Debe haber al menos un asistente registrado en alguna franja etaria"
    severity: warning
    require_any_of:
      - field: Asistentes_0_6
        greater_than: 0
      - field: Asistentes_7_14
        greater_than: 0
      - field: Asistentes_15_24
        greater_than: 0
      - field: Asistentes_25_34
        greater_than: 0
      - field: Asistentes_35_50
        greater_than: 0
      - field: Asistentes_Mas50
        greater_than: 0
    message: "No hay asistentes registrados en ninguna franja etaria — verificar si es correcto"


# =============================================================
# VALIDACIONES - Hoja PI
# =============================================================

  - id: pi_con_encabezado_requiere_comunidad
    sheet: pi
    description: "Si hay Diócesis y Capacitadora, debe haber al menos una comunidad registrada"
    severity: error
    when:
      all_of:
        - field: Diocesis
          not_empty: true
        - field: Capacitadora
          not_empty: true
    require_all:
      - field: Comunidad1
        not_empty: true
    message: "PI tiene datos de encabezado pero no se registró ninguna comunidad (B14)"

  - id: pi_con_encabezado_requiere_lideres
    sheet: pi
    description: "Si hay datos de encabezado, debe haber cantidad de líderes"
    severity: error
    when:
      all_of:
        - field: Diocesis
          not_empty: true
        - field: Capacitadora
          not_empty: true
    require_all:
      - field: Lideres
        greater_than: 0
    message: "PI con datos de encabezado pero sin cantidad de líderes registrada (C21)"

  - id: pi_con_encabezado_requiere_poblacion
    sheet: pi
    description: "Si hay datos de encabezado, debe haber al menos datos de población (niños o familias)"
    severity: error
    when:
      all_of:
        - field: Diocesis
          not_empty: true
        - field: Capacitadora
          not_empty: true
    require_any_of:
      - field: Ninos_0_3
        greater_than: 0
      - field: Ninos_4_6
        greater_than: 0
      - field: Familias
        greater_than: 0
    message: "PI con datos de encabezado pero sin datos de población (niños 0-3, 4-6 o familias)"

  - id: pi_con_encabezado_requiere_acciones_lideres
    sheet: pi
    description: "Si hay líderes, debe indicarse al menos una acción que realizan"
    severity: error
    when:
      field: Lideres
      greater_than: 0
    require_any_of:
      - field: LideresCelebracionVida
        not_empty: true
      - field: LideresVisitaDomiciliaria
        not_empty: true
      - field: LideresReunionEvaluacion
        not_empty: true
    message: "Hay líderes registradas pero no se indicó ninguna acción que realizan (C53-C55)"

  - id: pi_accion_lideres_requiere_frec_y_cant
    sheet: pi
    description: "Si una acción de líderes está activa, debe tener frecuencia y cantidad"
    severity: error
    when:
      field: LideresCelebracionVida
      equals: "Sí"
    require_all:
      - field: LideresCelebracionVida_Frec
        not_empty: true
      - field: LideresCelebracionVida_Cant
        greater_than: 0
    message: "Celebración de la vida marcada como Sí pero falta frecuencia o cantidad (D53, E53)"

  - id: pi_visita_requiere_frec_y_cant
    sheet: pi
    description: "Si visita domiciliaria está activa, debe tener frecuencia y cantidad"
    severity: error
    when:
      field: LideresVisitaDomiciliaria
      equals: "Sí"
    require_all:
      - field: LideresVisitaDomiciliaria_Frec
        not_empty: true
      - field: LideresVisitaDomiciliaria_Cant
        greater_than: 0
    message: "Visita domiciliaria marcada como Sí pero falta frecuencia o cantidad (D54, E54)"

  - id: pi_reunion_requiere_frec_y_cant
    sheet: pi
    description: "Si reunión de evaluación está activa, debe tener frecuencia y cantidad"
    severity: error
    when:
      field: LideresReunionEvaluacion
      equals: "Sí"
    require_all:
      - field: LideresReunionEvaluacion_Frec
        not_empty: true
      - field: LideresReunionEvaluacion_Cant
        greater_than: 0
    message: "Reunión de evaluación marcada como Sí pero falta frecuencia o cantidad (D55, E55)"

  - id: pi_con_encabezado_requiere_temas_abordados
    sheet: pi
    description: "Si hay datos de encabezado, debe haber al menos un tema abordado"
    severity: warning
    when:
      all_of:
        - field: Diocesis
          not_empty: true
        - field: Capacitadora
          not_empty: true
    require_any_of:
      - field: Abordada_Vacunas
        equals: "Sí"
      - field: Abordada_Higiene
        equals: "Sí"
      - field: Abordada_EstimulacionAdecuada
        equals: "Sí"
      - field: Abordada_Lactancia
        equals: "Sí"
      - field: Abordada_Alimentacion
        equals: "Sí"
      - field: Abordada_DerechosInfancias
        equals: "Sí"
      - field: Abordada_Otras
        not_empty: true
    message: "PI completa pero no se indicó ningún tema abordado en las reuniones"

  - id: pi_lideres_no_alfabetizadas_requiere_cant
    sheet: pi
    description: "Si no todas las líderes saben leer/escribir, debe indicarse cuántas no saben"
    severity: error
    when:
      field: LideresSabenLeerEscribir
      equals: "No"
    require_all:
      - field: CantLideresNoSabenLeerEscribir
        greater_than: 0
    message: "Se indicó que no todas las líderes saben leer/escribir pero falta la cantidad (C44)"

  - id: pi_madres_no_alfabetizadas_requiere_cant
    sheet: pi
    description: "Si no todas las madres están alfabetizadas, debe indicarse cuántas no lo están"
    severity: error
    when:
      field: TodasMadresAlfabetizadas
      equals: "No"
    require_all:
      - field: CantMadresNoAlfabetizadas
        greater_than: 0
    message: "Se indicó que no todas las madres están alfabetizadas pero falta la cantidad (C49)"


