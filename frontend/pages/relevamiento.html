<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emaús — Relevamiento</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
</head>
<body>

<nav class="navbar navbar-dark navbar-sec px-3 d-flex justify-content-between">
  <span class="navbar-brand d-flex align-items-center gap-2">
    <img src="/img/logo-emaus.png" alt="Emaús" style="height:28px">
    <span class="text-white-50">· Relevamiento</span>
  </span>
  <div id="navbar-info"></div>
</nav>

<div class="container-fluid mt-3">

  <!-- Selector de relevamiento (lo crea el admin, el ATL solo elige y completa) -->
  <div class="card border-0 shadow-sm p-3 mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Período a completar</label>
        <select class="form-select" id="rel-selector"></select>
      </div>
      <div class="col-md-3 d-grid">
        <button class="btn btn-primary" id="btn-enviar-relevamiento"><i class="bi bi-send"></i> Enviar relevamiento</button>
      </div>
    </div>
    <div class="mt-2" id="rel-estado-info"></div>
  </div>

  <div id="form-wrapper" class="hidden">
    <ul class="nav nav-tabs" id="formTabs">
      <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-pastoral"><i class="bi bi-heart"></i> Pastoral PI</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-espacios"><i class="bi bi-house-door"></i> Espacios Educativos</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-talleres"><i class="bi bi-easel"></i> Talleres</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-establecimientos"><i class="bi bi-building"></i> Establecimientos</a></li>
    </ul>

    <div class="tab-content" id="formTabsContent">
      <div class="tab-pane fade show active" id="tab-pastoral">
        <div id="seccion-pastoral"></div>
      </div>
      <div class="tab-pane fade" id="tab-espacios">
        <div id="seccion-espacios"></div>
      </div>
      <div class="tab-pane fade" id="tab-talleres">
        <div id="seccion-talleres"></div>
      </div>
      <div class="tab-pane fade" id="tab-establecimientos">
        <div id="seccion-establecimientos"></div>
      </div>
    </div>
  </div>

  <div id="sin-relevamiento" class="text-muted small">Todavía no hay un relevamiento abierto para tu Emaús. Tu administrador tiene que abrir el período antes de que puedas empezar a completarlo.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/env.js"></script>
<script src="/js/api.js"></script>
<script src="/js/session.js"></script>
<script src="/js/dynlist.js"></script>
<script src="/js/seccion-pastoral.js"></script>
<script src="/js/seccion-espacios.js"></script>
<script src="/js/seccion-talleres.js"></script>
<script src="/js/seccion-establecimientos.js"></script>
<script src="/js/relevamiento.js"></script>
</body>
</html>
