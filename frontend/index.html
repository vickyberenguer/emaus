<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emaús — Relevamiento</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="card shadow-sm border-0 p-4">
      <div class="text-center mb-3">
        <img src="/img/logo-emaus.png" alt="Emaús" style="height:90px" class="mb-2">
        <div class="text-muted small">Sistema de Relevamiento — Cáritas Argentina</div>
      </div>

      <form id="login-form">
        <div class="mb-3">
          <label for="email" class="form-label small fw-semibold">Email</label>
          <input type="email" class="form-control" id="email" name="email" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label small fw-semibold">Contraseña</label>
          <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
        </div>
        <div id="error-msg" class="alert alert-danger small py-2 hidden"></div>
        <button type="submit" id="btn-login" class="btn btn-primary w-100">Ingresar</button>
      </form>
    </div>
  </div>

  <script src="/js/env.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
